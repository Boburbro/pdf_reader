name: pdf_reader
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  adaptive_theme: ^3.7.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  google_fonts: ^6.2.1
  path: ^1.9.1
  receive_sharing_intent:
    path: third_party/receive_sharing_intent
  shared_preferences: ^2.3.4
  sqflite: ^2.4.2
  syncfusion_flutter_pdfviewer: ^33.1.45

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
